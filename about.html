        <div class="about-page-body">
            <p>Navhooe는 도시 풍경의 미니멀한 아름다움과 그 안에서 살아가는 사람들의 이야기를 독특한 시각으로 담아내는 만화가입니다. 투박한 콘크리트와 날카로운 강철 구조물, 빛과 그림자가 만들어내는 기하학적인 패턴에 매료되어 이를 흑백의 대조적인 선으로 표현하는 작업을 주로 합니다.</p>
            <p>그의 작품은 종종 도시 건축의 간단하고 꾸밈없는 선과 면에 대한 애정을 반영하며, 인공적인 환경이 자연과 상호작용하는 방식에 집중합니다.</p>
